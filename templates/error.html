<div class="min-h-[80vh] flex items-center justify-center bg-gray-50">
    <div class="text-center px-4 max-w-md">
        <!-- Animated error illustration -->
        <div class="relative inline-block mb-8">
            <div class="w-32 h-32 bg-red-100 rounded-full flex items-center justify-center mx-auto" style="animation: floatAnim 4s ease-in-out infinite;">
                <i class="fas fa-exclamation-triangle text-5xl text-red-400"></i>
            </div>
            <div class="absolute -top-2 -right-2 w-10 h-10 bg-amber-400 rounded-full flex items-center justify-center animate-bounce shadow-lg">
                <i class="fas fa-question text-white text-sm font-bold"></i>
            </div>
        </div>

        <h1 class="font-display text-3xl font-bold text-gray-900 mb-3">Oops!</h1>
        <p class="text-gray-600 mb-2 text-lg">
            {{ if .Error }}{{ .Error }}{{ else }}Terjadi kesalahan yang tidak terduga{{ end }}
        </p>
        <p class="text-gray-400 text-sm mb-8">
            Silakan coba lagi atau kembali ke beranda.
        </p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="btn btn-primary rounded-xl font-semibold">
                <i class="fas fa-home mr-2"></i>Kembali ke Beranda
            </a>
            <button onclick="history.back()" class="btn btn-ghost border border-gray-200 rounded-xl font-semibold hover:border-gray-300">
                <i class="fas fa-arrow-left mr-2"></i>Halaman Sebelumnya
            </button>
        </div>

        <!-- Quick search -->
        <div class="mt-10 pt-8 border-t border-gray-200">
            <p class="text-sm text-gray-400 mb-3">Atau cari jurnal langsung di sini:</p>
            <form action="/search" method="GET" class="flex gap-2 max-w-sm mx-auto">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" name="q" placeholder="Cari jurnal..." required
                        class="input input-md w-full bg-gray-50 border border-gray-200 pl-9 rounded-xl text-sm focus:border-primary" />
                </div>
                <button type="submit" class="btn btn-primary btn-md rounded-xl px-4">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>
    </div>
</div>
